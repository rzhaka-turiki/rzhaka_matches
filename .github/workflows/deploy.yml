name: CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Run clang-format with reviewdog
        uses: reviewdog/action-clang-format@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          clang_format_version: 14

  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: |
          cppcheck --enable=all --inconclusive \
            --suppress=missingInclude --suppress=unmatchedSuppression \
            --suppress=unusedFunction --error-exitcode=0 \
            src/ api/ 2> cppcheck-report.xml || true
      - name: Upload cppcheck report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-report
          path: cppcheck-report.xml

  build-and-push:
    needs: [clang-format, cppcheck]
    strategy:
      matrix:
        service: [fetcher, api]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile${{ matrix.service == 'api' && '.api' || '' }}
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest

  deploy-fetcher:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u a1uka --password-stdin
            docker pull ghcr.io/${{ github.repository }}/fetcher:latest
            docker stop fetcher || true
            docker rm fetcher || true
            docker run -d --name fetcher \
              --restart unless-stopped \
              -v /opt/fetcher/config.json:/etc/fetcher/config.json \
              --add-host=host.docker.internal:host-gateway \
              ghcr.io/${{ github.repository }}/fetcher:latest

  deploy-api:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u a1uka --password-stdin
            docker pull ghcr.io/${{ github.repository }}/api:latest
            docker stop match-api || true
            docker rm match-api || true
            docker run -d --name match-api \
              --restart unless-stopped \
              --network match-net \
              -v /opt/fetcher/config.json:/etc/fetcher/config.json \
              -p 127.0.0.1:50051:50051 \
              ghcr.io/${{ github.repository }}/api:latest